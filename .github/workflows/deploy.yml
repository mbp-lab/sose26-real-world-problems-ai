name: Deploy Jupyter Book

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Jupyter Book
        run: npm install -g jupyter-book

      - name: Build the Jupyter Book
        run: jupyter-book build --site --html --execute

      - name: Find site output
        run: |
          echo "Index files found:"
          find _build -name index.html
          SITE_DIR=$(dirname "$(find _build -name index.html | head -n 1)")
          echo "SITE_DIR=$SITE_DIR" >> $GITHUB_ENV
          echo "Using SITE_DIR=$SITE_DIR"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.SITE_DIR }}